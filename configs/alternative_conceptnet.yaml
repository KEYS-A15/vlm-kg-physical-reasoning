project:
  name: RKG-VLM
  stage: phase_2

paths:
  sample_data: ""
  trace_output_dir: outputs/traces
  prediction_output_dir: outputs/predictions

pipeline:
  max_entities: 5
  max_evidence_triples: 5

logging:
  level: INFO

model:
  name: Qwen/Qwen2.5-VL-7B-Instruct
  generation_max_new_tokens: 96
  entity_extraction_max_new_tokens: 64
  do_sample: false
  temperature: 0.0
  device_map: auto
  torch_dtype: auto

retrieval:
  mode: conceptnet_naive
  conceptnet:
    base_url: https://cstr-conceptnet-normalized-hf.space/
    timeout_seconds: 10.0
    max_edges_per_node: 10
    language: en
    overlap_weight: 0.25
